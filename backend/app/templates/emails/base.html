<html>
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search Agent</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #F3F4F6;">
    <div style="max-width: 600px; margin: 0 auto; background-color: white;">
        <!-- Header -->
        <div style="background: #4F46E5; color: white; padding: 20px; text-align: center;">
            <h1 style="margin: 0; font-size: 24px;">🔍 Product Search Agent</h1>
        </div>
        
        <!-- Content -->
        <div style="padding: 20px;">
            {% block content %}{% endblock %}
        </div>
        
        <!-- Footer -->
        <div style="background: #F3F4F6; padding: 20px; text-align: center; color: #6B7280; font-size: 14px;">
            <p style="margin: 0;">Manage your preferences in the dashboard</p>
            <p style="margin: 10px 0 0 0;">
                <a href="#" style="color: #4F46E5; text-decoration: none;">Unsubscribe</a> | 
                <a href="#" style="color: #4F46E5; text-decoration: none;">Settings</a>
            </p>
        </div>
    </div>
</body>
</html>
